apiVersion: apps/v1
kind: Deployment
metadata:
  name: __SERVICE_NAME__
  labels:
    app.kubernetes.io/name: __SERVICE_NAME__
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: __SERVICE_NAME__
  template:
    metadata:
      labels:
        app.kubernetes.io/name: __SERVICE_NAME__
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: __SERVICE_ACCOUNT__
      containers:
        - name: __SERVICE_NAME__
          image: __IMAGE__
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: __PORT__
              name: http
          env:
            - name: SERVICE_NAME
              value: __SERVICE_NAME__
            - name: SERVICE_VERSION
              value: __SERVICE_VERSION__
            - name: TENANT
              value: __TENANT__
            - name: PORT
              value: "__PORT__"
            - name: OTEL_SERVICE_NAME
              value: __SERVICE_NAME__
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
