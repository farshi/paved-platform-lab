apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-api-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  demo-api-dashboard.json: |
    {
      "uid": "demo-api",
      "title": "Demo API",
      "schemaVersion": 39,
      "version": 1,
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "panels": [
        {
          "type": "timeseries",
          "title": "Request Rate",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"demo-api\"}[5m]))",
              "legendFormat": "requests/sec"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Error Rate",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{service=\"demo-api\",status=~\"5..\"}[5m]))",
              "legendFormat": "errors/sec"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Latency P95",
          "gridPos": { "x": 0, "y": 8, "w": 24, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{service=\"demo-api\"}[5m])) by (le))",
              "legendFormat": "p95"
            }
          ]
        }
      ]
    }

