apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-api
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: tenant-admin
      containers:
        - name: demo-api
          image: ghcr.io/rfar/platform-guardrails-lab/demo-api:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVICE_NAME
              value: demo-api
            - name: SERVICE_VERSION
              value: 0.1.0
            - name: TENANT
              value: shared
            - name: PORT
              value: "8080"
            - name: ERROR_RATE_PERCENT
              value: "0"
            - name: DEFAULT_SLOW_SECONDS
              value: "0.25"
            - name: identity_ISSUER
              value: https://identity.example.com/oauth2/default
            - name: identity_AUDIENCE
              value: orders-api
            - name: OTEL_SERVICE_NAME
              value: demo-api
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4318/v1/traces
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
