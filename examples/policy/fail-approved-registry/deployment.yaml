apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-fail-approved-registry
  namespace: tenant-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-fail-approved-registry
  template:
    metadata:
      labels:
        app: policy-fail-approved-registry
    spec:
      containers:
        - name: policy-fail-approved-registry
          image: docker.io/library/nginx:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
