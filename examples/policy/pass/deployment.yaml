apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-pass
  namespace: tenant-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-pass
  template:
    metadata:
      labels:
        app: policy-pass
    spec:
      containers:
        - name: policy-pass
          image: ghcr.io/rfar/platform-guardrails-lab/demo-api:0.1.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
      securityContext:
        seccompProfile:
          type: RuntimeDefault
