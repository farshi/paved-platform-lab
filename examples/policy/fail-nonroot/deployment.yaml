apiVersion: apps/v1
kind: Deployment
metadata:
  name: policy-fail-nonroot
  namespace: tenant-a
spec:
  replicas: 1
  selector:
    matchLabels:
      app: policy-fail-nonroot
  template:
    metadata:
      labels:
        app: policy-fail-nonroot
    spec:
      containers:
        - name: policy-fail-nonroot
          image: ghcr.io/rfar/platform-guardrails-lab/demo-api:0.1.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
