apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-v1-api-platform-config
  namespace: api-platform
  labels:
    app.kubernetes.io/name: orders-v1
    app.kubernetes.io/component: api-platform-config
data:
  proxy: orders-v1
  target.url: https://api.example.com/orders
  identity.issuer: https://identity.example.com/oauth2/default
  identity.audience: orders-api
  identity.customer.claim: customer_id
  identity.client.claim: client_id
  required.policies: Verify-JWT,OAuthV2-Verify-Access-Token,Extract-Customer-Claims,Assign-identity-Headers,Quota-Per-Client,Spike-Arrest
  delivery.model: Git reviewed config, Argo CD sync, policy validation, telemetry proof
